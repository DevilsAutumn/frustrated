services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: frustratedai
      POSTGRES_USER: frustratedai
      POSTGRES_PASSWORD: frustratedai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frustratedai -d frustratedai"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
